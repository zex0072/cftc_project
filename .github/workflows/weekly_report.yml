name: CFTC 每周持仓报告

on:
  schedule:
    - cron: '0 6 * * 5'   # 每周五 14:00 北京时间
  workflow_dispatch:        # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成报告
        run: python3 cftc.py

      - name: 保存报告到仓库
        run: |
          mkdir -p reports
          mv cftc_*.html reports/ 2>/dev/null || true

          python3 - <<'EOF'
          import os, glob

          files = sorted(
              [f for f in os.listdir("reports") if f.endswith(".html") and f != "index.html"],
              reverse=True
          )
          latest = files[0] if files else ""
          items = "\n".join(f'<li><a href="{f}">{f}</a></li>' for f in files)
          html = f"""<!DOCTYPE html>
          <html><head><meta charset="UTF-8">
          <meta http-equiv="refresh" content="0; url={latest}">
          <title>CFTC 持仓报告</title></head>
          <body><h3>CFTC 持仓报告列表</h3><ul>{items}</ul></body></html>"""
          with open("reports/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print(f"index.html generated, latest={latest}, total={len(files)}")
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git status
          git commit -m "Weekly CFTC report $(date +%Y-%m-%d)" || echo "Nothing new to commit"
          git push
