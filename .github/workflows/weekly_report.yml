name: CFTC 每周持仓报告

on:
  schedule:
    - cron: '0 6 * * 5'   # 每周五 14:00 北京时间
  workflow_dispatch:        # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          ref: clean-start

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成报告
        run: python3 cftc.py

      - name: 保存报告到仓库
        run: |
          set -e
          mkdir -p reports
          mv cftc_*.html reports/ 2>/dev/null || true
          echo "--- reports 目录内容 ---"
          ls reports/

          python3 make_index.py

          ls reports/index.html
          echo "--- index.html 验证通过 ---"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin clean-start
          git add reports/
          git status
          git commit -m "Weekly CFTC report $(date +%Y-%m-%d)" || echo "Nothing new to commit"
          git push origin clean-start
